name: Deploy to PROD
on:
  push:
    branches: [main]

env:
  SMOKE_BASE_URL: https://hushhtech.com
  SHARED_SECRETS_PROJECT: hushone-app
  VITE_SUPABASE_REDIRECT_URL: https://hushhtech.com/auth/callback

jobs:
  deploy:
    name: Build & Deploy to Cloud Run (PROD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Prepare Node.js and dependencies
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund

      # 2. Auth with GCP and load shared web-build secrets
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Load web auth build env from Secret Manager
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=$(gcloud secrets versions access latest --project=\"$SHARED_SECRETS_PROJECT\" --secret=\"SUPABASE_URL\")" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$(gcloud secrets versions access latest --project=\"$SHARED_SECRETS_PROJECT\" --secret=\"SUPABASE_ANON_KEY\")" >> "$GITHUB_ENV"

      # 3. Build Vite app in runner (FAST)
      - name: Validate client auth env
        shell: bash
        run: |
          missing=0
          for name in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY VITE_SUPABASE_REDIRECT_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for the web auth build"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - run: npx vite build

      # 4. Deploy pre-built dist/ to Cloud Run (runtime-only Dockerfile)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hushh-tech-website \
            --source . \
            --project=hushh-tech-prod \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=10 \
            --port=8080 \
            --clear-base-image \
            --quiet

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke OAuth startup on deployed host
        run: node scripts/smoke-oauth-start.mjs "$SMOKE_BASE_URL"
